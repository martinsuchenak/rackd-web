baseURL = 'https://docs.rackd.io/'
languageCode = 'en-us'
title = 'Rackd'
theme = 'rackd'

# Site parameters
[params]
  description = 'IPAM and Device Inventory System - A powerful solution for managing IP addresses, network devices, and datacenter infrastructure'
  github = 'https://github.com/martinsuchenak/rackd'
  version = 'latest'
  license = 'MIT'

# Enable necessary features
enableRobotsTXT = true
enableGitInfo = true

# Pagination
paginate = 10

# Build settings
[build]
  [build.buildStats]
    enable = true
  [[build.cachebusters]]
    source = 'assets/notwatching/hugo_stats\.json'
    target = 'css'

# Markup settings
[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    codeFences = true
    guessSyntax = true
    lineNos = false
    noClasses = false
    style = 'github'
  [markup.tableOfContents]
    startLevel = 2
    endLevel = 4

# Outputs
[outputs]
  home = ['HTML', 'RSS']
  section = ['HTML', 'RSS']

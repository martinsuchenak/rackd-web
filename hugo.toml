baseURL = 'https://docs.rackd.io/'
languageCode = 'en-us'
title = 'Rackd Documentation'
theme = 'hugo-theme-relearn'

# Enable necessary features
enableRobotsTXT = true
enableGitInfo = true

# Pagination
paginate = 10

# Build settings
[build]
  [build.buildStats]
    enable = true
  [[build.cachebusters]]
    source = 'assets/notwatching/hugo_stats\.json'
    target = 'css'

# Theme parameters
[params]
  # Theme variants
  themeVariant = ['rackd-light', 'rackd-dark', 'auto']
  themeVariantAuto = ['rackd-light', 'rackd-dark']

  # Author information
  author = 'Martin Suchenak'

  # Edit links
  editURL = 'https://github.com/martinsuchenak/rackd-web/edit/main/content/'

  # Search
  search = true
  searchShortcuts = ['/']

  # Breadcrumbs
  breadcrumb = true

  # Table of contents
  toc = true

  # Disable sections
  disableSeoHiddenPages = true

  # Landing page URL
  landingPageUrl = '/'

  # Disable print
  disablePrint = false

  # Collapsible menu
  collapsibleMenu = true

  # Hide breadcrumb
  disableBreadcrumb = false

  # Hide Next/Previous
  disableNextPrev = false

# Markup settings
[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    codeFences = true
    guessSyntax = true
    lineNos = false
    noClasses = false
    style = 'monokai'
  [markup.tableOfContents]
    startLevel = 2
    endLevel = 4

# Outputs
[outputs]
  home = ['HTML', 'RSS', 'JSON']
  section = ['HTML', 'RSS']


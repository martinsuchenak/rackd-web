# Enable necessary features
enableRobotsTXT = true
enableGitInfo = true

# Pagination
paginate = 10

# Build settings
[build]
  [build.buildStats]
    enable = true
  [[build.cachebusters]]
    source = 'assets/notwatching/hugo_stats\.json'
    target = 'css'

# Markup settings
[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    codeFences = true
    guessSyntax = true
    lineNos = false
    noClasses = false
    style = 'github'
  [markup.tableOfContents]
    startLevel = 2
    endLevel = 4

# Outputs
[outputs]
  home = ['HTML', 'RSS']
  section = ['HTML', 'RSS']
